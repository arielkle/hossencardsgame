<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק קלפי חוסן</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes shimmer {
            100% { transform: translateX(400%); }
        }
        .animate-shimmer {
            animation: shimmer 1.5s infinite;
        }
        @keyframes fadeInQuick {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-pop-in {
            animation: fadeInQuick 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-100 via-purple-100 to-pink-100 font-sans m-0 p-0 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SparklesIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-purple-400"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        );
        const RefreshIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );

        function App() {
            const [deck, setDeck] = useState([]);
            const [currentCard, setCurrentCard] = useState(null);
            const [isAnimating, setIsAnimating] = useState(false);
            const [failedImages, setFailedImages] = useState(new Set());
            const [showResetModal, setShowResetModal] = useState(false);
            const [currentScreen, setCurrentScreen] = useState('intro');
            const [isPreloaded, setIsPreloaded] = useState(false);

            // טעינה מראש של כל התמונות (0-40)
            useEffect(() => {
                const imageUrls = Array.from({ length: 41 }, (_, i) => `card${i}.png`);
                let loadedCount = 0;

                imageUrls.forEach(url => {
                    const img = new Image();
                    img.src = url;
                    img.onload = () => {
                        loadedCount++;
                        if (loadedCount === imageUrls.length) setIsPreloaded(true);
                    };
                    img.onerror = () => {
                        loadedCount++;
                        if (loadedCount === imageUrls.length) setIsPreloaded(true);
                    };
                });

                // יצירת חפיסה ראשונית
                const initialDeck = Array.from({ length: 40 }, (_, i) => ({
                    id: i + 1,
                    image: `card${i + 1}.png`,
                }));
                setDeck(initialDeck);
            }, []);

            const drawCard = () => {
                if (deck.length === 0 || isAnimating) return;
                
                setIsAnimating(true);
                
                const randomIndex = Math.floor(Math.random() * deck.length);
                const drawnCard = deck[randomIndex];
                const newDeck = deck.filter((_, idx) => idx !== randomIndex);
                
                setCurrentCard(drawnCard);
                setDeck(newDeck);
                
                // אפקט מהיר מאוד של חצי שנייה כדי למנוע לחיצות כפולות
                setTimeout(() => setIsAnimating(false), 200);
            };

            const confirmReset = () => {
                const resetDeck = Array.from({ length: 40 }, (_, i) => ({
                    id: i + 1,
                    image: `card${i + 1}.png`,
                }));
                setDeck(resetDeck);
                setCurrentCard(null);
                setFailedImages(new Set());
                setShowResetModal(false);
            };

            if (currentScreen === 'intro') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center py-10 px-4">
                        <div className="w-full max-w-3xl flex flex-col items-center bg-white/70 backdrop-blur-md p-10 md:p-14 rounded-[2.5rem] shadow-xl border border-white/60 text-center animate-pop-in">
                            <h1 className="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-500 via-purple-500 to-pink-500 mb-8 flex items-center justify-center gap-4">
                                <SparklesIcon /> קלפי חוסן <SparklesIcon />
                            </h1>
                            <div className="text-right w-full bg-white/80 p-8 rounded-3xl mb-10 shadow-sm border border-white">
                                <h2 className="text-3xl font-bold text-slate-800 mb-6 border-b-2 border-purple-100 pb-4 text-center">הנחיות המשחק</h2>
                                <p className="text-slate-700 text-lg leading-relaxed text-center">
                                    המורה לוחץ/ת על כפתור <b>"הגרילו קלף"</b>. <br/>
                                    קלף אקראי ייחשף מיידית. המורה תבחר תלמיד/ה שיגיבו בהתאם.
                                </p>
                            </div>
                            <button 
                                onClick={() => setCurrentScreen('game')} 
                                className="px-16 py-5 rounded-full text-2xl font-bold text-white shadow-lg transition-all duration-300 bg-gradient-to-r from-sky-400 via-purple-400 to-pink-400 hover:-translate-y-2 hover:shadow-2xl active:scale-95"
                            >
                                התחילו לשחק!
                            </button>
                            {!isPreloaded && (
                                <p className="mt-4 text-slate-400 text-sm animate-pulse">טוען קלפים ברקע למניעת השהיה...</p>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4">
                    <div className="w-full max-w-4xl flex flex-col items-center mb-8 bg-white/60 backdrop-blur-sm p-6 rounded-3xl shadow-sm border border-white/50 animate-pop-in">
                        <h1 className="text-4xl font-bold text-slate-800 flex items-center gap-3">
                            <SparklesIcon /> קלפי חוסן <SparklesIcon />
                        </h1>
                    </div>

                    <div className="w-full max-w-5xl flex flex-col md:flex-row items-center justify-center gap-8">
                        
                        {/* תצוגת הקלף - ללא השהייה */}
                        <div className="flex-1 w-full flex justify-center items-center min-h-[450px]">
                            <div key={currentCard ? currentCard.id : 'initial'} className="w-full max-w-md animate-pop-in">
                                {currentCard ? (
                                    <div className="w-full h-full flex items-center justify-center">
                                        {!failedImages.has(currentCard.id) ? (
                                            <img 
                                                src={currentCard.image} 
                                                alt={`קלף ${currentCard.id}`} 
                                                className="w-full h-full object-contain drop-shadow-2xl rounded-3xl"
                                                onError={() => setFailedImages(prev => new Set(prev).add(currentCard.id))}
                                            />
                                        ) : (
                                            <div className="w-full aspect-[3/4] rounded-3xl shadow-2xl bg-gradient-to-br from-purple-500 to-pink-500 flex flex-col items-center justify-center text-white p-6 border-8 border-white">
                                                <span className="text-2xl opacity-80 mb-4">קלף חוסן</span>
                                                <span className="text-9xl font-black drop-shadow-lg">{currentCard.id}</span>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    /* קלף 0 תמיד מוצג ראשון */
                                    <div className="w-full h-full flex items-center justify-center">
                                        <img 
                                            src="card0.png" 
                                            alt="גב החפיסה" 
                                            className="w-full h-full object-contain drop-shadow-2xl rounded-3xl"
                                            onError={(e) => {
                                                e.target.style.display = 'none';
                                                e.target.parentNode.innerHTML = `
                                                    <div class="w-full aspect-[3/4] rounded-3xl shadow-xl border-4 border-dashed border-purple-300 flex flex-col items-center justify-center bg-white/50 text-purple-400 backdrop-blur-sm">
                                                        <h2 class="text-3xl font-bold">מוכנים?</h2>
                                                        <p class="mt-4 text-xl">לחצו להגרלה</p>
                                                    </div>
                                                `;
                                            }}
                                        />
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* פאנל שליטה */}
                        <div className="w-full max-w-xs flex flex-col items-center gap-6">
                            <div className="flex flex-col items-center bg-white/80 backdrop-blur-sm w-full py-6 rounded-3xl shadow-lg border border-purple-100">
                                <span className="text-xl font-medium mb-1 text-slate-600">נותרו בקופה</span>
                                <span className="text-6xl font-black text-purple-600">{deck.length}</span>
                            </div>

                            <button
                                onClick={drawCard}
                                disabled={deck.length === 0 || isAnimating}
                                className={`w-full relative overflow-hidden group py-6 rounded-3xl text-2xl font-bold text-white shadow-xl transition-all duration-200 ${deck.length === 0 ? 'bg-slate-300' : 'bg-gradient-to-r from-sky-400 via-purple-400 to-pink-400 hover:shadow-2xl hover:-translate-y-1 active:scale-95'}`}
                            >
                                <div className="absolute inset-0 w-1/4 h-full bg-white/20 skew-x-12 -translate-x-full group-hover:animate-shimmer"></div>
                                <span>{deck.length === 0 ? 'המשחק נגמר' : currentCard ? 'הגרילו קלף נוסף' : 'הגרילו קלף ראשון'}</span>
                            </button>

                            <button onClick={() => setShowResetModal(true)} className="w-full flex items-center justify-center gap-3 text-pink-500 hover:text-white transition-all py-4 rounded-2xl hover:bg-pink-400 border-2 border-pink-200 font-semibold active:scale-95">
                                <RefreshIcon /> איפוס חפיסה
                            </button>
                        </div>
                    </div>

                    {/* מודאל אישור איפוס */}
                    {showResetModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center animate-pop-in">
                                <h3 className="text-2xl font-bold mb-4">להתחיל מחדש?</h3>
                                <p className="text-slate-600 mb-8">החפיסה תתמלא ב-40 קלפים חדשים.</p>
                                <div className="flex gap-4 justify-center">
                                    <button onClick={() => setShowResetModal(false)} className="px-6 py-2 rounded-xl border border-slate-200">ביטול</button>
                                    <button onClick={confirmReset} className="px-6 py-2 rounded-xl bg-pink-500 text-white shadow-md hover:bg-pink-600 transition-colors">כן, אפס</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
