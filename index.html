<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק קלפי חוסן</title>
    
    <!-- טעינת העיצוב (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- טעינת React ישירות לדפדפן -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- טעינת Babel שמאפשר לקרוא את קוד ה-React -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* אנימציות מיוחדות למשחק */
        @keyframes shimmer {
            100% { transform: translateX(400%); }
        }
        .animate-shimmer {
            animation: shimmer 1.5s infinite;
        }
        .perspective-1000 {
            perspective: 1000px;
        }
        /* אנימציית סיבוב למחוון טעינה */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 2s linear infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-100 via-purple-100 to-pink-100 font-sans m-0 p-0 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // אייקונים
        const SparklesIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-purple-400"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        );
        const RefreshIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const LoadingIcon = () => (
            <svg className="animate-spin h-10 w-10 text-purple-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        );

        const generateInitialDeck = () => {
            return Array.from({ length: 40 }, (_, i) => ({
                id: i + 1,
                image: `card${i + 1}.png`, 
            }));
        };

        function App() {
            const [deck, setDeck] = useState(generateInitialDeck());
            const [currentCard, setCurrentCard] = useState(null);
            const [isAnimating, setIsAnimating] = useState(false);
            const [isImageLoading, setIsImageLoading] = useState(false);
            const [failedImages, setFailedImages] = useState(new Set());
            const [initialImageFailed, setInitialImageFailed] = useState(false);
            const [showResetModal, setShowResetModal] = useState(false);
            const [currentScreen, setCurrentScreen] = useState('intro');

            const drawCard = () => {
                if (deck.length === 0 || isAnimating) return;
                
                setIsAnimating(true);
                setIsImageLoading(true); // מתחילים טעינה של תמונה חדשה
                
                // עיכוב קצר לאנימציית היציאה
                setTimeout(() => {
                    const randomIndex = Math.floor(Math.random() * deck.length);
                    const drawnCard = deck[randomIndex];
                    
                    setCurrentCard(drawnCard);
                    const newDeck = deck.filter((_, idx) => idx !== randomIndex);
                    setDeck(newDeck);
                    
                    setIsAnimating(false);
                }, 300);
            };

            const confirmReset = () => {
                setDeck(generateInitialDeck());
                setCurrentCard(null);
                setFailedImages(new Set());
                setInitialImageFailed(false);
                setShowResetModal(false);
                setIsImageLoading(false);
            };

            // מסך פתיחה
            if (currentScreen === 'intro') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center py-10 px-4">
                        <div className="w-full max-w-3xl flex flex-col items-center bg-white/70 backdrop-blur-md p-10 md:p-14 rounded-[2.5rem] shadow-xl border border-white/60 text-center">
                            <h1 className="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-500 via-purple-500 to-pink-500 mb-8 flex items-center justify-center gap-4">
                                <SparklesIcon /> קלפי חוסן <SparklesIcon />
                            </h1>
                            <div className="text-right w-full bg-white/80 p-8 rounded-3xl mb-10 shadow-sm border border-white">
                                <h2 className="text-3xl font-bold text-slate-800 mb-6 border-b-2 border-purple-100 pb-4">הנחיות המשחק</h2>
                                <div className="space-y-6 text-slate-700 text-lg leading-relaxed">
                                    <p>המורה לוחץ/ת על כפתור <b>"הגרילו קלף"</b>. קלף אקראי ייחשף. המורה תבחר תלמיד/ה שיגיבו בהתאם לקלף.</p>
                                </div>
                            </div>
                            <button onClick={() => setCurrentScreen('game')} className="px-16 py-5 rounded-full text-2xl font-bold text-white shadow-lg transition-all duration-300 bg-gradient-to-r from-sky-400 via-purple-400 to-pink-400 hover:-translate-y-2">
                                התחילו לשחק!
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4 text-right">
                    <div className="w-full max-w-4xl flex flex-col items-center mb-10 bg-white/60 backdrop-blur-sm p-8 rounded-3xl shadow-sm border border-white/50">
                        <h1 className="text-4xl font-bold text-slate-800 flex items-center gap-3">
                            <SparklesIcon /> קלפי חוסן <SparklesIcon />
                        </h1>
                    </div>

                    <div className="w-full max-w-5xl flex flex-col md:flex-row items-center justify-center gap-12">
                        
                        {/* אזור הקלף */}
                        <div className="flex-1 w-full flex justify-center min-h-[400px]">
                            <div className={`transition-all duration-300 transform ${isAnimating ? 'scale-95 opacity-0' : 'scale-100 opacity-100'} w-full aspect-[3/4] max-w-md relative`}>
                                
                                {isImageLoading && currentCard && !failedImages.has(currentCard.id) && (
                                    <div className="absolute inset-0 flex items-center justify-center z-10 bg-white/30 rounded-3xl backdrop-blur-[2px]">
                                        <LoadingIcon />
                                    </div>
                                )}

                                {currentCard ? (
                                    <div className="w-full h-full flex items-center justify-center">
                                        {!failedImages.has(currentCard.id) ? (
                                            <img 
                                                src={currentCard.image} 
                                                alt={`קלף ${currentCard.id}`} 
                                                className={`w-full h-full object-contain drop-shadow-2xl rounded-3xl transition-opacity duration-300 ${isImageLoading ? 'opacity-0' : 'opacity-100'}`}
                                                onLoad={() => setIsImageLoading(false)}
                                                onError={() => {
                                                    setFailedImages(prev => new Set(prev).add(currentCard.id));
                                                    setIsImageLoading(false);
                                                }}
                                            />
                                        ) : (
                                            <div className="w-full h-full rounded-3xl shadow-2xl bg-gradient-to-br from-purple-400 to-pink-400 flex flex-col items-center justify-center text-white p-6">
                                                <span className="text-xl opacity-80">קלף מספר</span>
                                                <span className="text-9xl font-black">{currentCard.id}</span>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    /* קלף 0 - גב החפיסה */
                                    <div className="w-full h-full flex items-center justify-center">
                                        {!initialImageFailed ? (
                                            <img 
                                                src="card0.png" 
                                                alt="גב החפיסה" 
                                                className="w-full h-full object-contain drop-shadow-2xl rounded-3xl"
                                                onError={() => setInitialImageFailed(true)}
                                            />
                                        ) : (
                                            <div className="w-full h-full rounded-3xl shadow-xl border-4 border-dashed border-purple-200 flex flex-col items-center justify-center bg-white/50 text-purple-400 backdrop-blur-sm">
                                                <h2 className="text-2xl font-medium">הקופה מוכנה</h2>
                                                <p className="mt-2 text-center px-6">לחצו על הכפתור כדי להתחיל</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* פאנל שליטה */}
                        <div className="w-full max-w-xs flex flex-col items-center gap-6">
                            <div className="flex flex-col items-center bg-white/80 backdrop-blur-sm w-full py-8 rounded-3xl shadow-lg border border-purple-100">
                                <span className="text-xl font-medium mb-2 text-slate-600">קלפים שנותרו</span>
                                <span className="text-7xl font-black text-purple-600">{deck.length}</span>
                            </div>

                            <button
                                onClick={drawCard}
                                disabled={deck.length === 0 || isAnimating}
                                className={`w-full relative overflow-hidden group py-6 rounded-3xl text-2xl font-bold text-white shadow-xl transition-all duration-300 ${deck.length === 0 ? 'bg-slate-300' : 'bg-gradient-to-r from-sky-400 via-purple-400 to-pink-400 hover:shadow-2xl hover:-translate-y-1'}`}
                            >
                                <div className="absolute inset-0 w-1/4 h-full bg-white/20 skew-x-12 -translate-x-full group-hover:animate-shimmer"></div>
                                <span>{deck.length === 0 ? 'הסתיים המשחק' : currentCard ? 'הגרילו עוד קלף' : 'הגרילו קלף'}</span>
                            </button>

                            <button onClick={() => setShowResetModal(true)} className="w-full flex items-center justify-center gap-3 text-pink-500 hover:text-white transition-all py-4 rounded-2xl hover:bg-pink-400 border-2 border-pink-200 font-semibold">
                                <RefreshIcon /> התחלת משחק מחדש
                            </button>
                        </div>
                    </div>

                    {/* מודאל אישור */}
                    {showResetModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
                                <h3 className="text-2xl font-bold mb-4">התחלת משחק מחדש?</h3>
                                <p className="text-slate-600 mb-8">כל הקלפים יחזרו לקופה.</p>
                                <div className="flex gap-4 justify-center">
                                    <button onClick={() => setShowResetModal(false)} className="px-6 py-2 rounded-xl border border-slate-200">ביטול</button>
                                    <button onClick={confirmReset} className="px-6 py-2 rounded-xl bg-pink-500 text-white shadow-md">כן, מחדש</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
